version: 2

project_name: lune

builds:
  - id: lune
    dir: apps/cli
    main: ./cmd/lune
    binary: lune
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: archives
    builds:
      - lune
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: gentij
    name: lune

brews:
  - name: lune
    directory: Formula
    repository:
      owner: gentij
      name: homebrew-lune
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/gentij/lune
    description: Lune CLI
    license: MIT
    install: |
      bin.install "lune"

nfpms:
  - id: deb
    package_name: lune
    formats:
      - deb
    section: utils
    priority: optional
    maintainer: Lune <support@lune.dev>
    description: Lune CLI
    license: MIT
    homepage: https://github.com/gentij/lune

publishers:
  - name: cloudsmith-ubuntu-jammy
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/ubuntu/jammy {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
  - name: cloudsmith-ubuntu-focal
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/ubuntu/focal {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
  - name: cloudsmith-debian-bookworm
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/debian/bookworm {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
  - name: cloudsmith-debian-bullseye
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/debian/bullseye {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
