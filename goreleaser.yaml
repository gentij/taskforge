version: 2

project_name: lunie

builds:
  - id: lunie
    dir: apps/cli
    main: ./cmd/lunie
    binary: lunie
    ldflags:
      - >-
        -s -w
        -X github.com/gentij/lunie/apps/cli/internal/cli.version={{ .Version }}
        -X github.com/gentij/lunie/apps/cli/internal/cli.commit={{ .Commit }}
        -X github.com/gentij/lunie/apps/cli/internal/cli.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: archives
    builds:
      - lunie
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: gentij
    name: lunie

brews:
  - name: lunie
    directory: Formula
    repository:
      owner: gentij
      name: homebrew-lunie
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/gentij/lunie
    description: Lunie CLI
    license: MIT
    install: |
      bin.install "lunie"

nfpms:
  - id: deb
    package_name: lunie
    formats:
      - deb
    section: utils
    priority: optional
    maintainer: Lunie <support@lunie.dev>
    description: Lunie CLI
    license: MIT
    homepage: https://github.com/gentij/lunie

publishers:
  - name: cloudsmith-ubuntu-jammy
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/ubuntu/jammy {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
  - name: cloudsmith-ubuntu-focal
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/ubuntu/focal {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
  - name: cloudsmith-debian-bookworm
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/debian/bookworm {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
  - name: cloudsmith-debian-bullseye
    cmd: |
      cloudsmith push deb --republish {{ .Env.CLOUDSMITH_REPO }}/debian/bullseye {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
    dir: .
    ids:
      - deb
