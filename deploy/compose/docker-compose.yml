services:
  postgres:
    image: postgres:16-alpine
    container_name: lune-postgres
    environment:
      POSTGRES_USER: lune
      POSTGRES_PASSWORD: lune
      POSTGRES_DB: lune
    ports:
      - "5432:5432"
    volumes:
      - lune_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lune -d lune"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lune-redis
    ports:
      - "6379:6379"
    volumes:
      - lune_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lune_pgdata:
  lune_redisdata:
